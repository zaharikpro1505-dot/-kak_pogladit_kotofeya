<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Как погладить Котофея инструкция</title>
    <link rel="stylesheet" href="style.css">
	<link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body>
    <h1>Как погладить котофея</h1>
    <p>чтобы погладить котофея нажмите кнопку снизу</p>
    <button onclick="showInstruction()">погладить котофея</button>
	
    <!-- Здесь будет появляться инструкция -->
    <div id="instruction" style="margin-top: 20px; font-size: 18px; color: #333;"></div>

    <!-- Подключение JS -->
    <script src="script.js"></script>
</body>
</html>
